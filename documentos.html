<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documentos — Arquivo Kotovey</title>
<script>(function(){var s;try{s=localStorage.getItem('tema')}catch(e){}var d=matchMedia('(prefers-color-scheme: dark)').matches;document.documentElement.setAttribute('data-theme',s||(d?'dark':'light'));})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Spectral:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body data-page="documentos">

<main class="page">
  <div class="wrap">
    <p class="eyebrow">Documentos</p>
    <h1 class="secao-titulo">Fontes primárias, com origem indicada</h1>
    <p class="intro">Livros de imigração, códices, cartas de arquivos e registros paroquiais. Cada documento traz a fonte de onde veio. Onde existe, há link para a página exata e para o livro completo.</p>
    <div id="docs"></div>
  </div>
</main>

<script>
var BASE = "";
var DOCS = [
  { fonte: "Arquivo Nacional · Rio de Janeiro", titulo: "Vapor Attivita — Lista de Passageiros",
    desc: "Passageiros embarcados em Gênova com destino ao Brasil (dez. 1895 – jan. 1896). A família aparece como Dmytro Kutowy e família — sete pessoas, nacionalidade austríaca.",
    pagina: "documentos/codices e livros/relação de passageiros - vapor attivita/pagina_exata.pdf",
    livro: "documentos/codices e livros/relação de passageiros - vapor attivita/livro-completo_BR_RJANRIO_OL_0_RPV_PRJ_05544_d0001de0001.pdf" },
  { fonte: "Arquivo Nacional · Rio de Janeiro", titulo: "Hospedaria de Pinheiros — Relação de Imigrantes",
    desc: "Registro de entrada e saída na Hospedaria de Imigrantes do Rio de Janeiro. A família ficou hospedada de 20/01/1896 a 27/03/1896 antes de seguir para o Paraná.",
    pagina: "documentos/codices e livros/relação de imigrantes - hospedaria em pinheiro/pagina_exata.pdf",
    livro: "documentos/codices e livros/relação de imigrantes - hospedaria em pinheiro/documento_completo_BR_RJANRIO_OB_0_EPE_HIP_0073_d0013de0013 (HOSPEDARIA EM PINHEIRO).pdf" },
  { fonte: "Arquivo Público do Paraná", titulo: "Códice 817 — Chegada em Paranaguá",
    desc: "Registro de chegada de imigrantes ao Paraná. A família aparece com data de chegada em Paranaguá: 30/03/1896, com destino à Colônia Francisco Torres, Araucária.",
    pagina: "documentos/codices e livros/817 - registro da chegada em Paranaguá/pagina_exata.pdf",
    livro: "documentos/codices e livros/817 - registro da chegada em Paranaguá/livro_completo_817.pdf" },
  { fonte: "Arquivo Público do Paraná", titulo: "Códice 821 — Registro de Chegada PR 1895–1896",
    desc: "Registro oficial de chegada de imigrantes ao Paraná entre 1895 e 1896. Contém quatro registros da família em páginas distintas.",
    pagina: "documentos/codices e livros/821 - registro de chegada/paginas_exatas_4_registros.pdf" },
  { fonte: "Arquivo de Viena · Áustria (HHStA)", titulo: "Resposta do Arquivo de Viena",
    desc: "Resposta oficial ao contato enviado por Miguel Kotowey. Documento em alemão, recebido em 21 de maio de 2025. Referência: 2025-0.368.069-2-A.",
    pagina: "documentos/carta_viena/2025-0.368.069-2-A_-_Erledigung_21.05.2025_Miguel_KOTOWEY.pdf" },
  { fonte: "Fórum Ucraniano de Genealogia", titulo: "Publicação no fórum — idioma original",
    desc: "Registros genealógicos discutidos por pesquisadores ucranianos. Aponta o sobrenome de origem como Кутовий (Kutovy) e a região de Proniatyn como possível origem. 4 páginas.",
    multi: [
      "documentos/forum_ucraniano/idioma_original/forum_ucraniano_pagina_01.pdf",
      "documentos/forum_ucraniano/idioma_original/forum_ucraniano_pagina_02.pdf",
      "documentos/forum_ucraniano/idioma_original/forum_ucraniano_pagina_03.pdf",
      "documentos/forum_ucraniano/idioma_original/forum_ucraniano_pagina_04.pdf" ] },
  { fonte: "Fórum Ucraniano de Genealogia", titulo: "Publicação no fórum — tradução em português",
    desc: "Tradução das 4 páginas do fórum, para leitura e interpretação dos registros.",
    multi: [
      "documentos/forum_ucraniano/idioma_portugues/forum_ucraniano_pagina_01_PT_BR.pdf",
      "documentos/forum_ucraniano/idioma_portugues/forum_ucraniano_pagina_02_PT_BR.pdf",
      "documentos/forum_ucraniano/idioma_portugues/forum_ucraniano_pagina_03_PT_BR.pdf",
      "documentos/forum_ucraniano/idioma_portugues/forum_ucraniano_pagina_04_PT_BR.pdf" ] },
  { fonte: "Fórum Ucraniano de Genealogia", titulo: "Tópico sobre o sobrenome — Кутовий (original)",
    desc: "Tópico do fórum em que um pesquisador aponta <b>Кутовий (Kutovy)</b> como o que seria a forma correta do sobrenome. Idioma original (ucraniano).",
    pagina: "documentos/forum_ucraniano/idioma_original/forum_ucraniano_pagina_topico_secundario_01.pdf" },
  { fonte: "Fórum Ucraniano de Genealogia", titulo: "Tópico sobre o sobrenome — Кутовий (português)",
    desc: "Tradução em português do tópico do fórum sobre a forma que seria a correta do sobrenome, Кутовий (Kutovy).",
    pagina: "documentos/forum_ucraniano/idioma_portugues/forum_ucraniano_pagina_topico_secundario_01.pdf" },
];

function href(p) { return encodeURI(BASE + p); }
var fontes = [];
DOCS.forEach(function (d) { if (fontes.indexOf(d.fonte) < 0) fontes.push(d.fonte); });

document.getElementById("docs").innerHTML = fontes.map(function (f) {
  var cards = DOCS.filter(function (d) { return d.fonte === f; }).map(function (d) {
    var links = "";
    if (d.pagina) links += '<a class="doclink pdf" target="_blank" rel="noopener" href="' + href(d.pagina) + '">Página exata</a>';
    if (d.livro)  links += '<a class="doclink pdf" target="_blank" rel="noopener" href="' + href(d.livro) + '">Livro completo</a>';
    if (d.multi)  links += d.multi.map(function (p, i) { return '<a class="doclink pdf" target="_blank" rel="noopener" href="' + href(p) + '">Pág. ' + (i + 1) + "</a>"; }).join("");
    return '<div class="dcard"><div class="fonte">' + d.fonte + "</div><h3>" + d.titulo + "</h3><p>" + d.desc + '</p><div class="links">' + links + "</div></div>";
  }).join("");
  return '<div class="fonte-group"><div class="gen-label">' + f + '</div><div class="dcards">' + cards + "</div></div>";
}).join("");
</script>
<script src="app.js"></script>
</body>
</html>
